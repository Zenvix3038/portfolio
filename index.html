<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAISHNAV KC | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f0f12; color: #ffffff; overflow-x: hidden; }
        .grid-bg { background-image: radial-gradient(circle at 2px 2px, #1a1a1e 1px, transparent 0); background-size: 40px 40px; }
        .accent-red { color: #ff4d4d; }
        .video-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .video-modal.open { display: flex; }
        .video-container { position: relative; width: 90%; max-width: 900px; aspect-ratio: 16/9; }
        .close-modal { position: absolute; top: -45px; right: 0; color: white; font-size: 40px; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body class="grid-bg">

    <nav class="p-6 max-w-6xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-red-500 p-2 rounded"><i class="fas fa-video text-white"></i></div>
            <span class="font-black text-xl tracking-tighter uppercase">VAISHNAV KC</span>
        </div>
        <a href="https://wa.me/918089003038" class="text-green-500 text-2xl hover:scale-110 transition"><i class="fab fa-whatsapp"></i></a>
    </nav>

    <header class="px-6 py-16 max-w-6xl mx-auto">
        <h1 class="text-5xl md:text-8xl font-black leading-none uppercase">I EDIT. <br><span class="accent-red italic">YOU GROW.</span></h1>
        <p class="text-gray-400 mt-6 max-w-lg">High-quality video editing and motion graphics.</p>
        <div class="mt-8">
            <a href="https://wa.me/918089003038" class="bg-green-600 px-8 py-4 rounded-xl font-bold inline-flex items-center gap-3 hover:bg-green-700 transition">
                <i class="fab fa-whatsapp"></i> Contact Me
            </a>
        </div>
    </header>

    <section class="px-6 py-10 max-w-6xl mx-auto">
        <p class="uppercase text-red-500 text-xs font-bold tracking-widest mb-2">PORTFOLIO</p>
        <h2 class="text-4xl font-black mb-10 uppercase italic">Selected Work</h2>
        
        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 gap-10">
            </div>
    </section>

    <div id="videoModal" class="video-modal" onclick="closeVideo()">
        <div class="video-container" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeVideo()">&times;</button>
            <iframe id="drivePlayer" class="w-full h-full rounded-xl shadow-2xl" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <footer class="p-16 text-center border-t border-white/5 mt-10">
        <span class="font-black text-lg tracking-tighter uppercase">VAISHNAV KC</span>
        <p class="text-gray-600 text-xs mt-4 uppercase">© 2026 All Rights Reserved.</p>
    </footer>

    <script>
        // നിങ്ങളുടേ Drive ID വെച്ച് സെറ്റ് ചെയ്ത ലിസ്റ്റ്
        const projects = [
            {
                title: "Nova Fitness",
                category: "Brand Campaign",
                year: "2024",
                driveID: "14TBQPlIrNYn8fZbKszDTzxmp5JqrhOeD" // നിങ്ങളുടെ ID ഇവിടെ ചേർത്തു
            },
            {
                title: "Upcoming Project",
                category: "Motion Graphics",
                year: "2025",
                driveID: "" // അടുത്ത വീഡിയോ വരുമ്പോൾ ഇവിടെ ഐഡി ഇടാം
            }
        ];

        function renderGrid() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = projects.map(p => {
                if(!p.driveID) return ''; // ID ഇല്ലെങ്കിൽ കാണിക്കില്ല

                // തമ്പ്‌നൈൽ തനിയെ വരാൻ ഡ്രൈവ് ഐഡി ഉപയോഗിക്കുന്നു
                const thumbUrl = `https://drive.google.com/thumbnail?id=${p.driveID}&sz=w1000`;
                
                return `
                    <div class="group cursor-pointer" onclick="openVideo('${p.driveID}')">
                        <div class="relative overflow-hidden rounded-2xl aspect-video bg-gray-900 border border-white/10 group-hover:border-red-500/50 transition duration-500">
                            <img src="${thumbUrl}" alt="${p.title}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition duration-700">
                            <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                                <div class="bg-red-500 w-16 h-16 rounded-full flex items-center justify-center shadow-2xl transform group-hover:scale-110 transition duration-300">
                                    <i class="fas fa-play text-white text-2xl ml-1"></i>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4 text-center">
                            <h4 class="text-lg font-bold uppercase text-white group-hover:text-red-500 transition">${p.title}</h4>
                            <p class="text-gray-500 text-xs">${p.category} • ${p.year}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openVideo(id) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('drivePlayer');
            // Drive preview link for direct playback
            player.src = `https://drive.google.com/file/d/${id}/preview?autoplay=1`;
            modal.classList.add('open');
            document.body.style.overflow = 'hidden'; // കറങ്ങുന്നത് ഒഴിവാക്കാൻ
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('drivePlayer');
            player.src = ""; 
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
