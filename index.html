<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

/* GLASS EFFECT */
.glass{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(15px);
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
z-index:1000;
}

nav a{
color:#fff;
margin:0 15px;
text-decoration:none;
}

/* HERO */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background: radial-gradient(circle,#1a1a1a,#000);
}

.hero h1{
font-size:60px;
background: linear-gradient(90deg,#ff00cc,#3333ff);
-webkit-background-clip:text;
color:transparent;
}

.hero button{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff00cc,#3333ff);
color:white;
cursor:pointer;
}

/* SHOWREEL */
.showreel{
padding:100px 20px;
text-align:center;
}

.showreel video{
width:80%;
border-radius:20px;
}

/* PROJECT GRID */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:50px;
}

.card{
position:relative;
overflow:hidden;
}

.card img{
width:100%;
border-radius:20px;
transition:0.5s;
}

.card:hover img{
transform:scale(1.1);
}

/* LIKE BUTTON */
.like{
position:absolute;
bottom:10px;
left:10px;
cursor:pointer;
}

/* SERVICES */
.services{
padding:100px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

.service-box{
flex:1;
padding:30px;
}

/* TECH STACK */
.tech{
text-align:center;
padding:80px;
}

.tech img{
width:60px;
margin:10px;
filter:brightness(1.2);
}

/* ABOUT */
.about{
padding:80px;
display:flex;
gap:40px;
align-items:center;
}

.about img{
width:250px;
border-radius:50%;
}

/* CONTACT */
.contact{
padding:80px;
text-align:center;
}

input,textarea{
width:80%;
margin:10px;
padding:15px;
border-radius:10px;
border:none;
}

button{
cursor:pointer;
}

/* CUSTOM CURSOR */
.cursor{
width:20px;
height:20px;
border:2px solid white;
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
}

/* DARK MODE */
.dark-mode{
background:#fff;
color:#000;
}

/* ANIMATION */
.fade{
opacity:0;
transform:translateY(50px);
transition:1s;
}

.fade.active{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<div class="cursor"></div>

<nav class="glass">
<div>My Creative</div>
<div>
<a href="#">Home</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div>
<h1>Creative Editing World</h1>
<p>Next Level Visual Experience</p>
<button onclick="openWhatsApp()">Start Project</button>
</div>
</section>

<!-- SHOWREEL -->
<section class="showreel fade">
<h2>Showreel</h2>
<video src="video.mp4" autoplay muted loop></video>
</section>

<!-- GALLERY -->
<section class="gallery fade">

<div class="card glass">
<img src="img1.jpg">
<div class="like" onclick="sendLike()">❤️ Like</div>
</div>

<div class="card glass">
<img src="img2.jpg">
<div class="like" onclick="sendLike()">❤️ Like</div>
</div>

</section>

<!-- SERVICES -->
<section class="services fade">
<div class="service-box glass">Video Editing</div>
<div class="service-box glass">Motion Graphics</div>
<div class="service-box glass">Color Grading</div>
</section>

<!-- TECH STACK -->
<section class="tech fade">
<h2>Tools I Use</h2>
<img src="premiere.png">
<img src="aftereffects.png">
<img src="photoshop.png">
<img src="substance.png">
</section>

<!-- ABOUT -->
<section class="about fade">
<img src="me.jpg">
<div>
<h2>About Me</h2>
<p>Professional Editor with cinematic vision.</p>
</div>
</section>

<!-- CONTACT -->
<section class="contact fade">
<h2>Contact Me</h2>
<input type="text" placeholder="Your Name">
<textarea placeholder="Message"></textarea>
<br>
<button onclick="sendMessage()">Send</button>
</section>

<script>

// WHATSAPP
function openWhatsApp(){
window.open("https://wa.me/918089003038","_blank");
}

function sendMessage(){
let msg="New client message from website";
window.open("https://wa.me/918089003038?text="+msg);
}

function sendLike(){
let msg="Someone liked your work!";
window.open("https://wa.me/918089003038?text="+msg);
}

// CURSOR
const cursor = document.querySelector('.cursor');
document.addEventListener('mousemove', e=>{
cursor.style.top = e.clientY + 'px';
cursor.style.left = e.clientX + 'px';
});

// SCROLL ANIMATION
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
fades.forEach(f=>{
let top = f.getBoundingClientRect().top;
if(top < window.innerHeight - 100){
f.classList.add('active');
}
});
});

// BLOCK SCREENSHOT (LIMITED)
document.addEventListener('keydown', e=>{
if(e.key === 'PrintScreen'){
alert("Screenshot disabled!");
}
});

// DISABLE RIGHT CLICK
document.addEventListener('contextmenu', e=>e.preventDefault());

</script>

</body>
</html>
