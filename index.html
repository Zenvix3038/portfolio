    <title>Vaishnav KC | Creative Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #050811; color: white; scroll-behavior: smooth; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #ff8c00 0%, #ff0080 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Swiper Center Zoom Effect */
        .swiper { width: 100%; padding-top: 50px; padding-bottom: 80px; }
        .swiper-slide { 
            background-position: center; background-size: cover; width: 320px; height: 450px; 
            border-radius: 24px; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); 
            filter: blur(4px) brightness(0.4); transform: scale(0.85);
            cursor: pointer; position: relative;
        }
        .swiper-slide-active { filter: blur(0px) brightness(1); transform: scale(1.1); z-index: 10; border: 2px solid #ff8c00; box-shadow: 0 0 30px rgba(255, 140, 0, 0.3); }

        .nav-link:hover { color: #ff8c00; transition: 0.3s; }
        .service-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .service-card:hover { transform: translateY(-8px); background: rgba(255, 140, 0, 0.1); border-color: #ff8c00; }
        
        .hero-bg {
            background: radial-gradient(circle at top right, rgba(255, 140, 0, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(255, 0, 128, 0.15), transparent);
        }

        /* Lightbox/Modal Styles */
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        #lightbox.active { display: flex; }
        #lightbox-content { max-width: 90%; max-height: 80vh; border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
    </style>
</head>
