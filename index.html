<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAISHNAV KC | Video Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #a3b18a; 
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0d0d0b; 
            color: #ffffff;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; right: 0;
            width: 60%; height: 100%;
            background: radial-gradient(circle at center, #4a5d2322 0%, transparent 70%);
            z-index: -1;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            transition: all 0.4s ease;
        }

        .photo-mask {
            mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 85%, transparent 100%);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .project-card {
            min-width: 280px;
            max-width: 300px;
            flex-shrink: 0;
        }

        .video-modal { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(15px); justify-content: center; align-items: center; 
        }
        .video-modal.open { display: flex; }

        .accent-color { color: var(--accent); }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <nav class="p-6 max-w-7xl mx-auto flex justify-between items-center sticky top-0 z-50">
        <span class="font-extrabold text-2xl tracking-tighter italic">V<span class="accent-color">KC</span></span>
        <div class="hidden md:flex gap-10 text-xs font-bold uppercase tracking-[0.2em] text-gray-400">
            <a href="#home" class="hover:text-white transition">Home</a>
            <a href="#work" class="hover:text-white transition">Project</a>
            <a href="#services" class="hover:text-white transition">About</a>
        </div>
        <a href="https://wa.me/918089003038" class="glass-card px-5 py-2 text-green-400 flex items-center gap-2 hover:bg-green-500 hover:text-white transition-all">
            <i class="fab fa-whatsapp"></i> <span class="text-xs font-bold uppercase">Hire Me</span>
        </a>
    </nav>

    <header id="home" class="relative max-w-7xl mx-auto px-6 pt-10 flex flex-col md:flex-row items-center min-h-[85vh]">
        <div class="w-full md:w-1/2 flex justify-center md:justify-start order-2 md:order-1 mt-10 md:mt-0">
            <div class="relative max-w-[480px]">
                <img src="https://drive.google.com/uc?export=download&id=1L-En-xRTTlnCVSzcf5T4sQA1zbwsxI-U" alt="Vaishnav KC" class="w-full photo-mask object-cover grayscale brightness-110 contrast-125">
            </div>
        </div>

        <div class="w-full md:w-1/2 text-center md:text-left order-1 md:order-2 z-10">
            <p class="accent-color font-semibold tracking-widest mb-4">hello I'm Vaishnav</p>
            <h1 class="text-6xl md:text-8xl font-black mb-6 leading-tight uppercase tracking-tighter">Video Editor</h1>
            <p class="text-gray-500 max-w-md leading-relaxed mb-10 text-lg">
                Crafting cinematic stories through <span class="text-white font-bold">Motion & Frames</span>. Professional editing and precise color grading.
            </p>
            
            <div class="flex justify-center md:justify-start gap-6 opacity-40 hover:opacity-100 transition-all duration-500 mb-8">
                <i class="fab fa-adobe text-2xl"></i>
                <span class="font-bold border-r border-white/20 pr-6">PR | AE | PS</span>
                <span class="font-bold uppercase tracking-widest text-sm">Davinci Resolve</span>
            </div>
        </div>

        <div class="absolute bottom-[-40px] left-1/2 -translate-x-1/2 w-[95%] max-w-5xl glass-card p-8 grid grid-cols-2 md:grid-cols-4 gap-8 z-20">
            <div class="text-center md:text-left md:border-r border-white/10 px-4">
                <h3 class="text-3xl font-bold mb-1">5+</h3>
                <p class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">Years Experience</p>
            </div>
            <div class="text-center md:text-left md:border-r border-white/10 px-4">
                <h3 class="text-3xl font-bold mb-1">150+</h3>
                <p class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">Clients</p>
            </div>
            <div class="text-center md:text-left md:border-r border-white/10 px-4">
                <h3 class="text-3xl font-bold mb-1">240+</h3>
                <p class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">Projects</p>
            </div>
            <div class="text-center md:text-left px-4">
                <h3 class="text-3xl font-bold mb-1">20+</h3>
                <p class="text-gray-500 text-[10px] uppercase tracking-widest font-bold">Achievements</p>
            </div>
        </div>
    </header>

    <section id="work" class="px-6 py-32 max-w-7xl mx-auto overflow-hidden">
        <div class="flex justify-between items-end mb-12 px-4">
            <div>
                <p class="accent-color font-bold tracking-widest uppercase text-xs mb-2">Portfolio</p>
                <h2 class="text-4xl font-black uppercase italic">Selected Work</h2>
            </div>
            <div class="hidden md:flex gap-4">
                <button onclick="scrollSlider(-320)" class="glass-card w-12 h-12 flex items-center justify-center hover:bg-white hover:text-black transition-all">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button onclick="scrollSlider(320)" class="glass-card w-12 h-12 flex items-center justify-center hover:bg-white hover:text-black transition-all">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
        
        <div id="video-grid" class="flex gap-6 overflow-x-auto snap-x snap-mandatory no-scrollbar pb-10 px-4 scroll-smooth"></div>
    </section>

    <div id="videoModal" class="video-modal" onclick="closeVideo()">
        <div class="relative w-[95%] max-w-4xl aspect-video rounded-3xl overflow-hidden shadow-2xl border border-white/10" onclick="event.stopPropagation()">
            <iframe id="drivePlayer" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const projects = [
            { title: "Pongal", category: "Photoshop", year: "2026", driveID: "1assHgvNnwMiA1aL5cMolJiTZgWowIEkc" },
            { title: "Choco Bar", category: "After Effects", year: "2024", driveID: "14TBQPlIrNYn8fZbKszDTzxmp5JqrhOeD" },
            { title: "Product Promo", category: "Motion Design", year: "2025", driveID: "14TBQPlIrNYn8fZbKszDTzxmp5JqrhOeD" }
        ];

        function renderGrid() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = projects.map(p => {
                const thumbUrl = `https://drive.google.com/thumbnail?id=${p.driveID}&sz=w1000`;
                return `
                    <div class="project-card glass-card p-5 snap-center group cursor-pointer" onclick="openVideo('${p.driveID}')">
                        <div class="relative overflow-hidden rounded-[28px] aspect-[3/4] bg-black">
                            <img src="${thumbUrl}" alt="${p.title}" class="absolute inset-0 w-full h-full object-cover opacity-70 group-hover:scale-110 group-hover:opacity-40 transition duration-700">
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-500 translate-y-4 group-hover:translate-y-0">
                                <div class="w-14 h-14 rounded-full border border-white flex items-center justify-center text-white shadow-xl">
                                    <i class="fas fa-play text-xs ml-1"></i>
                                </div>
                            </div>
                        </div>
                        <div class="mt-6 px-2 text-left">
                            <h4 class="text-xl font-bold uppercase tracking-tighter mb-1">${p.title}</h4>
                            <div class="flex justify-between items-center">
                                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">${p.category}</p>
                                <span class="text-[10px] text-white/20 font-black">${p.year}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function scrollSlider(amount) {
            document.getElementById('video-grid').scrollBy({ left: amount, behavior: 'smooth' });
        }

        function openVideo(id) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('drivePlayer');
            player.src = `https://drive.google.com/file/d/${id}/preview`;
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('drivePlayer');
            player.src = ""; 
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
