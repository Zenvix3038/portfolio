<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaishnav KC | Creative Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050811; color: white; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #ff8c00 0%, #ff0080 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-link:hover { color: #ff8c00; transition: 0.3s; }
        .portfolio-img { transition: transform 0.3s ease, filter 0.3s ease; width: 100%; height: 100%; object-cover: cover; }
        .portfolio-img:hover { transform: scale(1.05); filter: brightness(1.1); }
        .hero-bg { background: linear-gradient(rgba(5, 8, 17, 0.7), rgba(5, 8, 17, 0.85)), url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80'); background-size: cover; background-position: center; background-attachment: fixed; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 glass py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="text-2xl font-bold gradient-text">Vaishnav Kc</div>
        <div class="hidden md:flex space-x-8 font-medium">
            <a href="#home" class="nav-link">Home</a>
            <a href="#projects" class="nav-link">Projects</a>
            <a href="#about" class="nav-link">About</a>
            <a href="#contact" class="nav-link text-orange-500">Contact</a>
        </div>
        <div class="md:hidden"><i class="fa-solid fa-bars text-xl"></i></div>
    </nav>

    <section id="home" class="hero-bg min-h-screen flex flex-col justify-center items-center text-center px-6 relative">
        <div class="mb-6 px-4 py-1 glass rounded-full text-xs uppercase tracking-widest text-orange-400 z-10 shadow-lg">Available for Freelance</div>
        <h1 class="text-6xl md:text-8xl font-extrabold mb-6 z-10">Design <span class="gradient-text">&</span> Edit.</h1>
        <p class="max-w-xl text-gray-200 text-lg md:text-xl mb-10 z-10">Graphic Designer & Video Editor based in Kerala.</p>
        <div class="flex space-x-4 z-10">
            <a href="#projects" class="bg-orange-600 hover:bg-orange-700 px-8 py-3 rounded-lg font-semibold transition">View Work</a>
            <label for="imageUpload" class="glass px-8 py-3 rounded-lg font-semibold hover:bg-white/10 transition cursor-pointer">Upload Photo</label>
            <input type="file" id="imageUpload" class="hidden" accept="image/*" multiple>
        </div>
    </section>

    <section id="projects" class="py-24 px-6 md:px-12 max-w-7xl mx-auto">
        <h2 class="text-4xl font-bold mb-12">Featured <span class="text-orange-500">Projects</span></h2>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass rounded-2xl overflow-hidden group lg:col-span-2">
                <div class="p-6 border-b border-white/5 flex justify-between items-center">
                    <div>
                        <span class="text-orange-500 text-xs font-bold uppercase tracking-widest">Photographs</span>
                        <h3 class="text-2xl font-bold mt-1">Traveling Collection</h3>
                    </div>
                </div>
                
                <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 gap-3 p-4">
                    <div class="h-48 flex items-center justify-center rounded-lg bg-white/5 border border-dashed border-white/20" id="placeholder-text">
                        <span class="text-gray-500 text-sm">No photos added yet</span>
                    </div>
                </div>
            </div>

            <div class="glass rounded-2xl overflow-hidden group">
                <div class="h-64 bg-slate-800 flex items-center justify-center">Video Reel</div>
                <div class="p-6">
                    <span class="text-orange-500 text-xs font-bold uppercase">Video Editing</span>
                    <h3 class="text-xl font-bold mt-2">Cinematic Short Films</h3>
                </div>
            </div>
        </div>
    </section>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const gallery = document.getElementById('gallery');
        const placeholder = document.getElementById('placeholder-text');

        imageUpload.addEventListener('change', function(event) {
            const files = event.target.files;

            if (files.length > 0) {
                // Remove placeholder text on first upload
                if (placeholder) placeholder.remove();

                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const reader = new FileReader();

                    reader.onload = function(e) {
                        const div = document.createElement('div');
                        div.className = "h-48 overflow-hidden rounded-lg bg-gray-900";
                        
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = "portfolio-img w-full h-full object-cover";
                        
                        div.appendChild(img);
                        gallery.appendChild(div);
                    }
                    reader.readAsDataURL(file);
                }
            }
        });
    </script>
</body>
</html>
