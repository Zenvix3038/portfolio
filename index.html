<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaishnav KC | Creative ERP Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .sidebar-item:hover { background: rgba(59, 130, 246, 0.1); border-left: 4px solid #3b82f6; }
        /* ഇതിൽ ഇനിയും ആയിരക്കണക്കിന് ലൈൻ കസ്റ്റം CSS ആഡ് ചെയ്യാം */
    </style>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-gray-900 dark:text-white">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-gray-800 hidden md:flex flex-col">
            <div class="p-6 border-b dark:border-gray-800">
                <h1 class="text-xl font-bold bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent">VKC CREATIVE ERP</h1>
            </div>
            <nav class="flex-1 overflow-y-auto p-4 space-y-2">
                <a href="#" class="sidebar-item flex items-center p-3 rounded-lg text-blue-600 bg-blue-50 dark:bg-blue-900/20"><i class="fas fa-home mr-3"></i> Dashboard</a>
                <a href="#" class="sidebar-item flex items-center p-3 rounded-lg"><i class="fas fa-briefcase mr-3"></i> Projects</a>
                <a href="#" class="sidebar-item flex items-center p-3 rounded-lg"><i class="fas fa-users mr-3"></i> Clients</a>
                <a href="#" class="sidebar-item flex items-center p-3 rounded-lg"><i class="fas fa-chart-line mr-3"></i> Analytics</a>
                <a href="#" class="sidebar-item flex items-center p-3 rounded-lg"><i class="fas fa-layer-group mr-3"></i> Assets (Blender/AE)</a>
                <a href="#" class="sidebar-item flex items-center p-3 rounded-lg"><i class="fas fa-cog mr-3"></i> Settings</a>
            </nav>
            <div class="p-4 border-t dark:border-gray-800">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">VK</div>
                    <div><p class="text-sm font-semibold">Vaishnav KC</p><p class="text-xs text-gray-500 text-green-500">● Online</p></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto relative">
            <header class="sticky top-0 z-40 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md border-b dark:border-gray-800 p-4 flex justify-between items-center">
                <h2 class="font-semibold">Workspace Overview</h2>
                <div class="flex items-center space-x-4">
                    <button class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full"><i class="fas fa-bell"></i></button>
                    <button id="themeToggle" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full"><i class="fas fa-moon"></i></button>
                </div>
            </header>

            <div class="p-8 space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="p-6 bg-white dark:bg-slate-900 rounded-2xl shadow-sm border dark:border-gray-800">
                        <p class="text-sm text-gray-500">Active Projects</p>
                        <h3 class="text-3xl font-bold mt-2">12</h3>
                    </div>
                    <div class="p-6 bg-white dark:bg-slate-900 rounded-2xl shadow-sm border dark:border-gray-800">
                        <p class="text-sm text-gray-500">Completed Render</p>
                        <h3 class="text-3xl font-bold mt-2">142</h3>
                    </div>
                    </div>

                <section class="bg-white dark:bg-slate-900 rounded-2xl p-8 border dark:border-gray-800">
                    <h3 class="text-xl font-bold mb-6">Client Onboarding Portal</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-4">
                            <div><label class="block text-sm mb-1">Client Name</label><input type="text" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-slate-800 border dark:border-gray-700"></div>
                            <div><label class="block text-sm mb-1">Project Category</label>
                                <select class="w-full p-3 rounded-xl bg-gray-50 dark:bg-slate-800 border dark:border-gray-700">
                                    <option>Video Production</option><option>3D Animation</option><option>Graphic Branding</option>
                                </select>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <div><label class="block text-sm mb-1">Budget Allocation</label><input type="number" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-slate-800 border dark:border-gray-700"></div>
                            <div><label class="block text-sm mb-1">Deadline</label><input type="date" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-slate-800 border dark:border-gray-700"></div>
                        </div>
                    </div>
                    <button class="mt-6 w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold text-white transition-all shadow-lg shadow-blue-500/20">Initialize Onboarding</button>
                </section>

                <section class="bg-white dark:bg-slate-900 rounded-2xl border dark:border-gray-800 overflow-hidden">
                    <div class="p-6 border-b dark:border-gray-800 flex justify-between">
                        <h3 class="font-bold text-lg">Live Workflows</h3>
                        <button class="text-blue-500 text-sm">View All</button>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 dark:bg-gray-800/50">
                            <tr>
                                <th class="p-4 text-xs font-semibold uppercase">Project</th>
                                <th class="p-4 text-xs font-semibold uppercase">Status</th>
                                <th class="p-4 text-xs font-semibold uppercase">Health</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="border-t dark:border-gray-800">
                                <td class="p-4 text-sm">3D Product Render</td>
                                <td class="p-4 text-sm text-yellow-500 font-medium">Rendering (45%)</td>
                                <td class="p-4 text-sm"><div class="w-24 bg-gray-200 h-2 rounded-full overflow-hidden"><div class="bg-blue-500 h-full w-1/2"></div></div></td>
                            </tr>
                            </tbody>
                    </table>
                </section>

            </div>
        </main>
    </div>

    <script>
        // DARK MODE LOGIC
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // ഇനിയും ആയിരക്കണക്കിന് ലൈൻ ജാവാസ്ക്രിപ്റ്റ് ഫംഗ്ഷനുകൾ ഇവിടെ ആഡ് ചെയ്യാം
    </script>
</body>
</html>
