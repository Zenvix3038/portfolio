<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAISHNAV KC | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f0f12; color: #ffffff; }
        .grid-bg { background-image: radial-gradient(circle at 2px 2px, #1a1a1e 1px, transparent 0); background-size: 40px 40px; }
        .accent-red { color: #ff4d4d; }
        
        /* Video Modal Styles */
        .video-modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            justify-content: center; 
            align-items: center; 
        }
        .video-modal.open { display: flex; }
        .video-container { 
            position: relative; 
            width: 95%; 
            max-width: 900px; 
            aspect-ratio: 16/9; 
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }
        .close-modal { 
            position: absolute; 
            top: -45px; right: 0; 
            color: white; font-size: 35px; 
            cursor: pointer; background: none; border: none;
        }

        /* Adobe Icon Styling */
        .adobe-icon {
            transition: all 0.3s ease;
            filter: grayscale(100%);
        }
        .adobe-icon:hover {
            filter: grayscale(0%);
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="grid-bg">

    <nav class="p-6 max-w-6xl mx-auto flex justify-between items-center">
        <span class="font-black text-xl tracking-tighter uppercase">VAISHNAV KC</span>
        <a href="https://wa.me/918089003038" class="text-green-500 text-2xl hover:scale-110 transition"><i class="fab fa-whatsapp"></i></a>
    </nav>

    <header class="px-6 py-10 max-w-6xl mx-auto text-center md:text-left border-b border-white/5">
        <h1 class="text-5xl md:text-7xl font-black uppercase leading-tight mb-2">VAISHNAV KC</h1>
        <h3 class="text-xl md:text-2xl font-bold accent-red uppercase tracking-widest mb-6 italic">Professional Video Editor & Motion Designer</h3>
        
        <div class="flex gap-6 justify-center md:justify-start items-center opacity-80 mt-4">
            <img src="https://cdn.worldvectorlogo.com/logos/adobe-premiere-pro-cc.svg" title="Premiere Pro" class="adobe-icon w-8 h-8">
            <img src="https://cdn.worldvectorlogo.com/logos/adobe-after-effects-cc.svg" title="After Effects" class="adobe-icon w-8 h-8">
            <img src="https://cdn.worldvectorlogo.com/logos/adobe-photoshop-2.svg" title="Photoshop" class="adobe-icon w-8 h-8">
            <img src="https://cdn.worldvectorlogo.com/logos/adobe-illustrator-cc.svg" title="Illustrator" class="adobe-icon w-8 h-8">
        </div>
    </header>

    <section class="px-6 py-12 max-w-6xl mx-auto">
        <h2 class="text-3xl font-black mb-10 uppercase italic border-l-4 border-red-500 pl-4">Selected Work</h2>
        
        <div id="video-grid" class="grid grid-cols-1 md:grid-cols-2 gap-10">
            </div>
    </section>

    <div id="videoModal" class="video-modal" onclick="closeVideo()">
        <div class="video-container" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeVideo()">&times;</button>
            <iframe id="drivePlayer" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const projects = [
            {
                title: "Nova Fitness",
                category: "Brand Campaign",
                year: "2024",
                driveID: "14TBQPlIrNYn8fZbKszDTzxmp5JqrhOeD"
            }
        ];

        function renderGrid() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = projects.map(p => {
                const thumbUrl = `https://drive.google.com/thumbnail?id=${p.driveID}&sz=w1000`;
                
                return `
                    <div class="group cursor-pointer" onclick="openVideo('${p.driveID}')">
                        <div class="relative overflow-hidden rounded-2xl aspect-video bg-gray-900 border border-white/10 group-hover:border-red-500/50 transition duration-500">
                            <img src="${thumbUrl}" alt="${p.title}" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:scale-105 transition duration-700">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="bg-red-600 w-16 h-16 rounded-full flex items-center justify-center shadow-2xl">
                                    <i class="fas fa-play text-white text-2xl ml-1"></i>
                                </div>
                            </div>
                        </div>
                        <div class="mt-4 text-center md:text-left">
                            <h4 class="text-lg font-bold uppercase text-white">${p.title}</h4>
                            <p class="text-gray-500 text-xs">${p.category} • ${p.year}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openVideo(id) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('drivePlayer');
            player.src = `https://drive.google.com/file/d/${id}/preview`;
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('drivePlayer');
            player.src = ""; 
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
