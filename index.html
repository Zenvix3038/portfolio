    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f0f12; 
            color: #ffffff; 
            overflow-x: hidden; 
        }
        
        .grid-bg { 
            background-image: radial-gradient(circle at 2px 2px, #1a1a1e 1px, transparent 0); 
            background-size: 40px 40px; 
        }

        /* Video Modal Styles */
        .video-modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            justify-content: center; 
            align-items: center; 
        }
        .video-modal.open { display: flex; }
        .video-container { 
            position: relative; 
            width: 95%; 
            max-width: 900px; 
            aspect-ratio: 16/9; 
            background: #000;
            border-radius: 20px;
            overflow: hidden;
        }
        .close-modal { 
            position: absolute; 
            top: -45px; right: 10px; 
            color: white; font-size: 35px; 
            cursor: pointer; background: none; border: none;
        }

        /* Horizontal Slider Custom Styles */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .project-card {
            min-width: 280px;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 35px;
            padding: 20px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .project-card:hover { transform: translateY(-5px); }

        /* Adobe SVG Styles */
        .adobe-svg {
            width: 32px;
            height: 32px;
            fill: #666;
            transition: 0.3s;
        }
        .adobe-svg:hover {
            fill: #ff4d4d;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="grid-bg">

        <a href="https://wa.me/918089003038" class="text-green-500 text-3xl hover:scale-110 transition">
            <i class="fab fa-whatsapp"></i>
        </a>
    </nav>

    <header class="px-6 py-12 max-w-6xl mx-auto text-center md:text-left">
        <h1 class="text-5xl md:text-7xl font-black uppercase leading-tight mb-2">VAISHNAV KC</h1>
        <h3 class="text-xl md:text-2xl font-bold text-[#ff4d4d] uppercase tracking-widest mb-8 italic">
            Professional Video Editor & Motion Designer
        </h3>
        
        <div class="flex gap-6 justify-center md:justify-start items-center mt-4">
            <svg class="adobe-svg" viewBox="0 0 24 24" title="Premiere Pro"><path d="M19.7 0H4.3C1.9 0 0 1.9 0 4.3v15.4C0 22.1 1.9 24 4.3 24h15.4c2.4 0 4.3-1.9 4.3-4.3V4.3C24 1.9 22.1 0 19.7 0zM8.5 16.5H6.3V7.5h3.6c1.5 0 2.4.8 2.4 2.1 0 1.4-1.1 2.2-2.5 2.2H8.5v4.7zm0-6.8v2.1h1.1c.7 0 1-.3 1-.9s-.3-.9-1.1-.9H8.5zm9.2 6.8h-2.2v-4.3h-1.6v4.3h-2.2V7.5h2.2v3.1h1.6V7.5h2.2v9z"/></svg>

            <svg class="adobe-svg" viewBox="0 0 24 24" title="Photoshop"><path d="M19.7 0H4.3C1.9 0 0 1.9 0 4.3v15.4C0 22.1 1.9 24 4.3 24h15.4c2.4 0 4.3-1.9 4.3-4.3V4.3C24 1.9 22.1 0 19.7 0zM10.3 11.4c0 1.7-1.3 2.6-3.1 2.6H5.4v2.5H3.2V7.5h4.1c1.8 0 3 1 3 2.6v1.3zm-4.9-2.1v1.9h1.6c.7 0 1-.3 1-.8s-.3-.8-1-.8H5.4zm10.7 4.1c0 2.2-1.7 3.3-3.8 3.3-2.1 0-3.6-.9-3.7-2.8h2.1c.1.9.8 1.2 1.6 1.2.9 0 1.5-.4 1.5-1.3 0-.8-.5-1.1-1.6-1.5-1.7-.5-2.8-1.2-2.8-3.1 0-1.8 1.4-3.1 3.5-3.1 1.8 0 3.3.9 3.4 2.6h-2c-.1-.7-.7-1-1.3-1-.8 0-1.3.4-1.3 1.1s.5 1 1.6 1.3c1.9.6 2.8 1.2 2.8 3.3z"/></svg>

    <section class="px-6 py-10 max-w-6xl mx-auto">
        <h2 class="text-3xl font-black mb-10 uppercase italic border-l-4 border-red-500 pl-4">Selected Work</h2>
        
        <div class="relative">
            <div id="video-grid" class="flex gap-6 overflow-x-auto snap-x snap-mandatory no-scrollbar pb-10">
                </div>

            <div class="flex justify-center gap-6 mt-4">
                <button onclick="scrollSlider(-300)" class="bg-white/5 hover:bg-[#ff4d4d] w-14 h-14 rounded-full flex items-center justify-center transition shadow-xl">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <button onclick="scrollSlider(300)" class="bg-white/5 hover:bg-[#ff4d4d] w-14 h-14 rounded-full flex items-center justify-center transition shadow-xl">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </section>

    <div id="videoModal" class="video-modal" onclick="closeVideo()">
        <div class="video-container" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="closeVideo()">&times;</button>
            <iframe id="drivePlayer" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <footer class="p-16 text-center border-t border-white/5 mt-10">
        <span class="font-black text-lg tracking-tighter uppercase opacity-50">VAISHNAV KC</span>
    </footer>

    <script>
        // --- Projects Data ---
        const projects = [
            {
                title: "Nova Fitness",
                category: "Product Research",
                driveID: "14TBQPlIrNYn8fZbKszDTzxmp5JqrhOeD",
                color: "rgba(255, 100, 100, 0.05)"
            },
            {
                title: "Luxe Ads",
                category: "Social Media",
                driveID: "YOUR_SECOND_ID_HERE",
                color: "rgba(100, 255, 100, 0.05)"
            },
            {
                title: "Motion Reel",
                category: "Visual Effects",
                driveID: "YOUR_THIRD_ID_HERE",
                color: "rgba(100, 100, 255, 0.05)"
            }
        ];

        function renderGrid() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = projects.map(p => {
                if(!p.driveID || p.driveID.includes("YOUR")) {
                    // ID illatha cards kaanikenda
                    return '';
                }
                const thumbUrl = `https://drive.google.com/thumbnail?id=${p.driveID}&sz=w1000`;
                
                return `
                    <div class="project-card snap-center group cursor-pointer" style="background: ${p.color}" onclick="openVideo('${p.driveID}')">
                        <div class="relative overflow-hidden rounded-[25px] aspect-[4/5] mb-6">
                            <img src="${thumbUrl}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110">
                            <div class="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <div class="bg-[#ff4d4d] w-14 h-14 rounded-full flex items-center justify-center shadow-lg">
                                    <i class="fas fa-play text-white"></i>
                                </div>
                            </div>
                        </div>
                        <div class="px-2">
                            <h4 class="text-2xl font-bold text-white mb-1 uppercase tracking-tight">${p.title}</h4>
                            <p class="text-gray-400 text-sm font-medium">${p.category}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Slider Logic
        function scrollSlider(val) {
            document.getElementById('video-grid').scrollBy({ left: val, behavior: 'smooth' });
        }

        // Modal Logic
        function openVideo(id) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('drivePlayer');
            player.src = `https://drive.google.com/file/d/${id}/preview`;
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('drivePlayer');
            player.src = ""; 
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }

        window.onload = renderGrid;
    </script>
</body>
