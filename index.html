<section class="px-6 py-12 max-w-6xl mx-auto overflow-hidden">
    <h2 class="text-3xl font-black mb-10 uppercase italic border-l-4 border-red-500 pl-4">Selected Work</h2>
    
    <div class="relative group">
        <div id="video-grid" class="flex gap-6 overflow-x-auto snap-x snap-mandatory no-scrollbar pb-10 scroll-smooth">
            </div>

        <div class="flex justify-center gap-4 mt-6">
            <button onclick="scrollSlider(-300)" class="bg-white/10 hover:bg-red-500 w-12 h-12 rounded-full flex items-center justify-center transition-all">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button onclick="scrollSlider(300)" class="bg-white/10 hover:bg-red-500 w-12 h-12 rounded-full flex items-center justify-center transition-all">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</section>

<style>
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
        display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
    }
    
    /* Project Card Custom Style */
    .project-card {
        min-width: 280px;
        max-width: 320px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 30px;
        padding: 20px;
        flex-shrink: 0;
    }
</style>

<script>
    const projects = [
        {
            title: "Nova Fitness",
            category: "Product Research",
            year: "2024",
            driveID: "14TBQPlIrNYn8fZbKszDTzxmp5JqrhOeD",
            bgColor: "bg-orange-100/10" // Custom background color like Opal app
        },
        {
            title: "Luxe Beauty",
            category: "Social Content",
            year: "2024",
            driveID: "YOUR_DRIVE_ID_HERE",
            bgColor: "bg-green-100/10"
        }
    ];

    function renderGrid() {
        const grid = document.getElementById('video-grid');
        grid.innerHTML = projects.map(p => `
            <div class="project-card snap-center group cursor-pointer ${p.bgColor}" onclick="openVideo('${p.driveID}')">
                <div class="relative overflow-hidden rounded-[20px] aspect-[4/5] mb-6">
                    <img src="https://drive.google.com/thumbnail?id=${p.driveID}&sz=w1000" class="w-full h-full object-cover transition duration-700 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <div class="bg-red-500 w-14 h-14 rounded-full flex items-center justify-center">
                            <i class="fas fa-play text-white text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="text-left">
                    <h4 class="text-xl font-bold text-white mb-1">${p.title}</h4>
                    <p class="text-gray-400 text-sm">${p.category}</p>
                </div>
            </div>
        `).join('');
    }

    // Slider Scroll Function
    function scrollSlider(amount) {
        document.getElementById('video-grid').scrollBy({ left: amount, behavior: 'smooth' });
    }

    window.onload = renderGrid;
</script>
