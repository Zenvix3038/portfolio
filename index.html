<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAISHNAV KC | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ff4d4d;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #08080a; 
            color: #ffffff;
            overflow-x: hidden;
        }

        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #ff4d4d22 0%, #7000ff22 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(20%, 20%); }
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            transition: all 0.4s ease;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .project-card {
            min-width: 280px;
            max-width: 300px;
            flex-shrink: 0;
        }

        /* Preview Video Style */
        .preview-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            opacity: 1; /* Always visible instead of black */
            transform: scale(1.6); /* To hide Drive black bars */
        }

        .video-modal { 
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(15px);
            justify-content: center; 
            align-items: center; 
        }
        .video-modal.open { display: flex; }

        .nav-link { position: relative; transition: 0.3s; }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 0;
            width: 0%; height: 2px;
            background: var(--accent);
            transition: 0.3s;
        }
        .nav-link:hover::after { width: 100%; }
    </style>
</head>
<body>

    <div class="blob"></div>
    <div class="blob" style="right: -10%; top: 40%; background: linear-gradient(135deg, #00d4ff11 0%, #002eff11 100%);"></div>

    <nav class="p-6 max-w-6xl mx-auto flex justify-between items-center sticky top-0 z-50">
        <span class="font-extrabold text-2xl tracking-tighter italic">V<span class="text-red-500">KC</span></span>
        <div class="hidden md:flex gap-8 text-sm font-semibold uppercase tracking-widest">
            <a href="#work" class="nav-link">Work</a>
            <a href="#services" class="nav-link">Services</a>
            <a href="#contact" class="nav-link">Contact</a>
        </div>
        <a href="https://wa.me/918089003038" class="glass-card px-5 py-2 text-green-400 flex items-center gap-2 hover:bg-green-500 hover:text-white transition-all">
            <i class="fab fa-whatsapp"></i> <span class="text-xs font-bold uppercase">Hire Me</span>
        </a>
    </nav>

    <header class="px-6 py-16 max-w-6xl mx-auto text-center">
        <h1 class="text-6xl md:text-8xl font-black uppercase leading-tight mb-4 tracking-tighter">
            VAISHNAV <span class="text-transparent" style="-webkit-text-stroke: 1px #fff;">KC</span>
        </h1>
        <p class="text-xl md:text-2xl font-light text-gray-400 mb-8 italic">Professional Video Editor & Motion Designer</p>
        
        <div class="flex justify-center gap-6 opacity-40 grayscale hover:grayscale-0 transition-all duration-500">
            <i class="fab fa-adobe text-2xl"></i>
            <span class="font-bold border-r border-white/20 pr-6">PR | AE | PS</span>
            <span class="font-bold">DAVINCI RESOLVE</span>
        </div>
    </header>

    <section id="work" class="px-6 py-10 max-w-7xl mx-auto overflow-hidden">
        <div class="flex justify-between items-end mb-10 px-4">
            <div>
                <p class="text-red-500 font-bold tracking-widest uppercase text-xs mb-2">Portfolio</p>
                <h2 class="text-4xl font-black uppercase">Selected Work</h2>
            </div>
            <div class="hidden md:flex gap-4">
                <button onclick="scrollSlider(-320)" class="glass-card w-12 h-12 flex items-center justify-center hover:bg-red-500 transition-all">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button onclick="scrollSlider(320)" class="glass-card w-12 h-12 flex items-center justify-center hover:bg-red-500 transition-all">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
        
        <div id="video-grid" class="flex gap-6 overflow-x-auto snap-x snap-mandatory no-scrollbar pb-10 px-4 scroll-smooth">
        </div>
    </section>

    <footer id="contact" class="px-6 py-20 max-w-6xl mx-auto text-center">
        <div class="glass-card p-12 bg-gradient-to-br from-white/5 to-red-500/5">
            <h2 class="text-4xl md:text-5xl font-black mb-6 italic">LET'S CREATE SOMETHING EPIC</h2>
            <a href="https://wa.me/918089003038" class="inline-block bg-white text-black font-bold px-10 py-4 rounded-full hover:bg-red-500 hover:text-white transition-all transform hover:scale-105 uppercase tracking-widest">Contact Now</a>
        </div>
        <p class="mt-12 text-gray-600 text-xs uppercase tracking-widest">&copy; 2026 Vaishnav KC. Kerala, India.</p>
    </footer>

    <div id="videoModal" class="video-modal" onclick="closeVideo()">
        <div class="relative w-[95%] max-w-4xl aspect-video rounded-3xl overflow-hidden shadow-2xl border border-white/10" onclick="event.stopPropagation()">
            <iframe id="drivePlayer" class="w-full h-full" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const projects = [
            {
                title: "Pongal", 
                category: "Photoshop", 
                year: "2026",
                driveID: "1assHgvNnwMiA1aL5cMolJiTZgWowIEkc"
            },
            {
                title: "Choco Bar",
                category: "After Effects",
                year: "2024",
                driveID: "14TBQPlIrNYn8fZbKszDTzxmp5JqrhOeD"
            },
            {
                title: "Product Promo",
                category: "Motion Design",
                year: "2025",
                driveID: "14TBQPlIrNYn8fZbKszDTzxmp5JqrhOeD"
            },
            {
                title: "Cinematic Reel",
                category: "Color Grading",
                year: "2024",
                driveID: "1assHgvNnwMiA1aL5cMolJiTZgWowIEkc"
            }
        ];

        function renderGrid() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = projects.map(p => {
                const thumbUrl = `https://drive.google.com/thumbnail?id=${p.driveID}&sz=w1000`;
                const previewUrl = `https://drive.google.com/file/d/${p.driveID}/preview?autoplay=1&mute=1`;
                
                return `
                    <div class="project-card glass-card p-5 snap-center group cursor-pointer" onclick="openVideo('${p.driveID}')">
                        <div class="relative overflow-hidden rounded-[24px] aspect-[3/4] bg-black">
                            <iframe src="${previewUrl}" class="preview-video" frameborder="0"></iframe>
                            
                            <img src="${thumbUrl}" alt="${p.title}" class="absolute inset-0 w-full h-full object-cover opacity-100 group-hover:opacity-0 transition duration-700 z-10">
                            
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-500 translate-y-4 group-hover:translate-y-0 z-20">
                                <div class="bg-red-500 w-14 h-14 rounded-full flex items-center justify-center text-white shadow-xl">
                                    <i class="fas fa-play ml-1"></i>
                                </div>
                            </div>
                        </div>
                        <div class="mt-6 px-2">
                            <h4 class="text-xl font-bold uppercase tracking-tighter mb-1">${p.title}</h4>
                            <div class="flex justify-between items-center">
                                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">${p.category}</p>
                                <span class="text-[10px] text-white/20 font-black">${p.year}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function scrollSlider(amount) {
            document.getElementById('video-grid').scrollBy({ left: amount, behavior: 'smooth' });
        }

        function openVideo(id) {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('drivePlayer');
            player.src = `https://drive.google.com/file/d/${id}/preview?autoplay=1`;
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            const modal = document.getElementById('videoModal');
            const player = document.getElementById('drivePlayer');
            player.src = ""; 
            modal.classList.remove('open');
            document.body.style.overflow = '';
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
