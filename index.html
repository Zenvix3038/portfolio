<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaishnav KC | Creative Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #050811; 
            color: white;
            scroll-behavior: smooth;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(135deg, #ff8c00 0%, #ff0080 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-bg {
            background: linear-gradient(rgba(5, 8, 17, 0.8), rgba(5, 8, 17, 0.95)), 
                        url('https://lh3.googleusercontent.com/d/YOUR_FILE_ID0');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* --- NEW ANIMATION STYLES --- */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .animate-float {
            animation: float 8s ease-in-out infinite;
            pointer-events: none;
            user-select: none;
        }

        .bg-icons-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            opacity: 0.15; /* Subtility level */
        }
        /* --- END ANIMATION STYLES --- */

        .nav-link:hover { color: #ff8c00; transition: 0.3s; }
        .portfolio-img:hover { transform: scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 glass py-4 px-6 md:px-12 flex justify-between items-center">
        <div class="text-2xl font-bold gradient-text">Vaishnav Kc</div>
        <div class="hidden md:flex space-x-8 font-medium">
            <a href="#home" class="nav-link">Home</a>
            <a href="#projects" class="nav-link">Projects</a>
            <a href="#contact" class="nav-link text-orange-500">Contact</a>
        </div>
        <div class="md:hidden cursor-pointer" id="menu-btn">
            <i class="fa-solid fa-bars text-xl"></i>
        </div>
    </nav>

    <section id="home" class="hero-bg min-h-screen flex flex-col justify-center items-center text-center px-6 relative overflow-hidden">
        
        <div class="bg-icons-layer">
            <img src="https://adobe.com/content/dam/cc/icons/aftereffects.svg" class="absolute w-32 h-32 animate-float" style="top: 10%; left: 5%; animation-delay: 0s; filter: blur(1px);">
            <img src="https://adobe.com/content/dam/cc/icons/premiere.svg" class="absolute w-48 h-48 animate-float" style="top: 50%; left: 10%; animation-delay: 2s; filter: blur(4px);">
            <img src="https://adobe.com/content/dam/cc/icons/photoshop.svg" class="absolute w-24 h-24 animate-float" style="top: 15%; right: 8%; animation-delay: 1s;">
            <div class="absolute text-8xl text-orange-600 animate-float" style="bottom: 15%; right: 12%; animation-delay: 3s; filter: blur(2px);">
                <i class="fa-brands fa-blender"></i>
            </div>
            <img src="https://adobe.com/content/dam/cc/icons/aftereffects.svg" class="absolute w-16 h-16 animate-float" style="top: 40%; left: 45%; animation-delay: 5s; opacity: 0.5;">
            <i class="fa-solid fa-film absolute text-6xl text-gray-400 animate-float" style="bottom: 10%; left: 35%; animation-delay: 4s; filter: blur(3px);"></i>
        </div>

        <div class="mb-6 px-4 py-1 glass rounded-full text-xs uppercase tracking-widest text-orange-400 z-10 shadow-lg">
            Available for Freelance
        </div>
        
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 z-10 drop-shadow-2xl">
            Design <span class="gradient-text">&</span> Video Editing 
        </h1>
        
        <p class="max-w-xl text-gray-200 text-lg md:text-xl mb-10 leading-relaxed z-10">
            Crafting powerful visual narratives for modern brands. 
            Graphic Designer & Video Editor based in Kerala.
        </p>

        <div class="flex space-x-6 mb-12 z-10 bg-black/40 p-5 rounded-full border border-white/10 backdrop-blur-md">
            <div class="sw-icon cursor-pointer transition hover:-translate-y-2" onclick="showSoftwareAbout('ae')">
                <img src="https://adobe.com/content/dam/cc/icons/aftereffects.svg" alt="AE" class="w-12 h-12 grayscale hover:grayscale-0 transition duration-300">
            </div>
            <div class="sw-icon cursor-pointer transition hover:-translate-y-2" onclick="showSoftwareAbout('pr')">
                <img src="https://adobe.com/content/dam/cc/icons/premiere.svg" alt="Pr" class="w-12 h-12 grayscale hover:grayscale-0 transition duration-300">
            </div>
            <div class="sw-icon cursor-pointer transition hover:-translate-y-2" onclick="showSoftwareAbout('ps')">
                <img src="https://adobe.com/content/dam/cc/icons/photoshop.svg" alt="Ps" class="w-12 h-12 grayscale hover:grayscale-0 transition duration-300">
            </div>
            <div class="sw-icon cursor-pointer transition hover:-translate-y-2" onclick="showSoftwareAbout('fcp')">
                <i class="fa-solid fa-film w-12 h-12 text-gray-400 hover:text-white text-4xl flex items-center justify-center"></i>
            </div>
            <div class="sw-icon cursor-pointer transition hover:-translate-y-2" onclick="showSoftwareAbout('blender')">
                <i class="fa-brands fa-blender w-12 h-12 text-gray-400 hover:text-orange-500 text-4xl flex items-center justify-center"></i>
            </div>
        </div>
        
        <div class="flex space-x-4 z-10">
            <a href="#projects" class="bg-orange-600 hover:bg-orange-700 px-8 py-3 rounded-lg font-semibold transition shadow-xl">View Work</a>
            <a href="https://wa.me/918089003038" target="_blank" class="glass px-8 py-3 rounded-lg font-semibold hover:bg-white/10 transition">WhatsApp Me</a>
        </div>

        <div class="absolute bottom-0 w-full h-32 bg-gradient-to-t from-[#050811] to-transparent"></div>
    </section>

    <script>
        // Existing script for menu and software details...
        const menuBtn = document.getElementById('menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        function toggleMenu() { mobileMenu.classList.toggle('hidden'); }
        if(menuBtn) menuBtn.addEventListener('click', toggleMenu);

        const softwareData = {
            ae: { title: 'Adobe After Effects', description: 'Used for motion graphics and VFX.', color: '#9999FF' },
            pr: { title: 'Adobe Premiere Pro', description: 'Industry standard video editing.', color: '#EA77FF' },
            ps: { title: 'Adobe Photoshop', description: 'Graphic design and photo manipulation.', color: '#31A8FF' },
            fcp: { title: 'Final Cut Pro', description: 'Apple\'s pro editing software.', color: '#FF4545' },
            blender: { title: 'Blender', description: '3D modeling and animation.', color: '#FF973D' }
        };

        function showSoftwareAbout(key) {
            const section = document.getElementById('software-about');
            const content = document.getElementById('about-content');
            if(softwareData[key]) {
                content.innerHTML = `<h3 class="text-3xl font-bold mb-3" style="color: ${softwareData[key].color}">${softwareData[key].title}</h3><p class="text-gray-200 text-lg">${softwareData[key].description}</p>`;
                section.classList.remove('hidden');
                section.scrollIntoView({ behavior: 'smooth' });
            }
        }
        function closeSoftwareAbout() { document.getElementById('software-about').classList.add('hidden'); }
    </script>
</body>
</html>
